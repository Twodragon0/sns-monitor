apiVersion: v1
kind: Secret
metadata:
  name: sns-monitor-secrets
  namespace: sns-monitor
type: Opaque
stringData:
  # AWS Credentials
  AWS_SECRET_ACCESS_KEY: "test"

  # API Keys (Base64 encode in production!)
  YOUTUBE_API_KEY: "your-youtube-api-key"
  TELEGRAM_BOT_TOKEN: "your-telegram-bot-token"
  TWITTER_BEARER_TOKEN: "your-twitter-bearer-token"
  INSTAGRAM_ACCESS_TOKEN: "your-instagram-token"
  FACEBOOK_ACCESS_TOKEN: "your-facebook-token"
  THREADS_ACCESS_TOKEN: "your-threads-token"

  # LLM API Keys
  CLAUDE_API_KEY: "your-claude-api-key"
  OPENAI_API_KEY: "your-openai-api-key"
  BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"

  # OAuth Credentials
  CLAUDE_OAUTH_CLIENT_ID: "your-claude-oauth-client-id"
  CLAUDE_OAUTH_CLIENT_SECRET: "your-claude-oauth-client-secret"
  OPENAI_OAUTH_CLIENT_ID: "your-openai-oauth-client-id"
  OPENAI_OAUTH_CLIENT_SECRET: "your-openai-oauth-client-secret"

  # Okta OIDC Credentials
  OKTA_CLIENT_SECRET: "your-okta-client-secret"
  OKTA_API_TOKEN: "your-okta-api-token"

  # Google Search (Optional)
  GOOGLE_SEARCH_API_KEY: ""
  GOOGLE_SEARCH_ENGINE_ID: ""
---
# Note: In production, create secrets using:
# kubectl create secret generic sns-monitor-secrets \
#   --from-literal=YOUTUBE_API_KEY=your-key \
#   --from-literal=OKTA_CLIENT_SECRET=your-secret \
#   -n sns-monitor
