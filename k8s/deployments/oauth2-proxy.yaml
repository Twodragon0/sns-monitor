apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: sns-monitor
  labels:
    app: oauth2-proxy
    component: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
        component: auth
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.4.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        args:
          - --provider=oidc
          - --provider-display-name="Okta"
          - --oidc-issuer-url=$(OKTA_ISSUER)
          - --client-id=$(OKTA_CLIENT_ID)
          - --client-secret=$(OKTA_CLIENT_SECRET)
          - --cookie-secret=$(COOKIE_SECRET)
          - --cookie-secure=true
          - --cookie-samesite=lax
          - --cookie-expire=24h
          - --cookie-refresh=1h
          - --email-domain=*
          - --upstream=static://202
          - --http-address=0.0.0.0:4180
          - --redirect-url=https://sns-monitor.your-domain.com/oauth2/callback
          - --whitelist-domain=.your-domain.com
          - --pass-authorization-header=true
          - --pass-access-token=true
          - --set-authorization-header=true
          - --set-xauthrequest=true
          - --skip-provider-button=true
          - --ssl-insecure-skip-verify=false
          - --request-logging=true
        env:
        - name: OKTA_ISSUER
          valueFrom:
            configMapKeyRef:
              name: sns-monitor-config
              key: OKTA_ISSUER
        - name: OKTA_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: sns-monitor-config
              key: OKTA_CLIENT_ID
        - name: OKTA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: sns-monitor-secrets
              key: OKTA_CLIENT_SECRET
        - name: COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-secrets
              key: cookie-secret
        ports:
        - containerPort: 4180
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: sns-monitor
  labels:
    app: oauth2-proxy
spec:
  type: ClusterIP
  ports:
  - port: 4180
    targetPort: 4180
    protocol: TCP
    name: http
  selector:
    app: oauth2-proxy
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
  namespace: sns-monitor
type: Opaque
stringData:
  # Generate cookie secret with: python -c 'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())'
  cookie-secret: "REPLACE_WITH_GENERATED_SECRET"
