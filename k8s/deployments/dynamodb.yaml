apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-local
  namespace: sns-monitor
  labels:
    app: dynamodb-local
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamodb-local
  template:
    metadata:
      labels:
        app: dynamodb-local
        component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dynamodb
        image: amazon/dynamodb-local:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        command:
          - java
          - -jar
          - DynamoDBLocal.jar
          - -sharedDb
          - -dbPath
          - ./data
        ports:
        - containerPort: 8000
          name: dynamodb
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: dynamodb-data
          mountPath: /home/dynamodblocal/data
        workingDir: /home/dynamodblocal
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: dynamodb-data
        persistentVolumeClaim:
          claimName: dynamodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-local
  namespace: sns-monitor
  labels:
    app: dynamodb-local
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: dynamodb
  selector:
    app: dynamodb-local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dynamodb-pvc
  namespace: sns-monitor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
