apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-data-pvc
  namespace: sns-monitor
  labels:
    app: sns-monitor
    component: storage
spec:
  # ReadWriteOnce로 변경 (대부분의 스토리지 클래스 지원)
  # 여러 Pod에서 동시 접근이 필요한 경우 NFS 기반 스토리지 클래스 사용
  accessModes:
    - ReadWriteOnce  # 또는 ReadWriteMany (NFS 사용 시)
  resources:
    requests:
      storage: 20Gi
  # 스토리지 클래스 선택
  # 옵션 1: 표준 스토리지 (ReadWriteOnce)
  storageClassName: standard
  # 옵션 2: NFS 기반 스토리지 (ReadWriteMany)
  # storageClassName: nfs-client
  # 옵션 3: 동적 프로비저닝 비활성화 (수동 PV 생성)
  # storageClassName: ""  # 빈 문자열

---
# NFS 기반 스토리지가 필요한 경우 사용할 수 있는 예시
# 실제 환경에 맞게 수정 필요
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-data-pv-nfs
  namespace: sns-monitor
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: nfs-server.example.com
    path: /exports/sns-monitor-data
  storageClassName: nfs-manual



