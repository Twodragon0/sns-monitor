apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sns-monitor-ingress
  namespace: sns-monitor
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Okta OIDC Authentication (using oauth2-proxy)
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.sns-monitor.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,Authorization"

    # CORS Configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  tls:
  - hosts:
    - sns-monitor.your-domain.com
    secretName: sns-monitor-tls
  rules:
  - host: sns-monitor.your-domain.com
    http:
      paths:
      # Frontend (React App)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000

      # API Backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-backend
            port:
              number: 8080

      # Auth Service (Okta callback)
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8080

      # OAuth2 Proxy (bypass auth for this path)
      - path: /oauth2
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy
            port:
              number: 4180
---
# Ingress for public endpoints (without authentication)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sns-monitor-public-ingress
  namespace: sns-monitor
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - sns-monitor.your-domain.com
    secretName: sns-monitor-tls
  rules:
  - host: sns-monitor.your-domain.com
    http:
      paths:
      # Public health check endpoint
      - path: /api/health
        pathType: Exact
        backend:
          service:
            name: api-backend
            port:
              number: 8080
