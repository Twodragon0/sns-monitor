name: Deploy to EKS

# NOTE: EKS cluster has private endpoint only.
# GitHub Actions cannot reach the private endpoint.
# Use local kubectl for deployment instead:
#   export KUBECONFIG=/path/to/kubeconfig
#   kubectl rollout restart deployment/sns-monitor-frontend -n platform
#   kubectl rollout restart deployment/sns-monitor-api-backend -n platform

on:
  # Disabled automatic deployment - EKS endpoint is private
  # workflow_run:
  #   workflows: ["Build and Push Docker Images"]
  #   types:
  #     - completed
  #   branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'
      dry_run:
        description: 'Dry run mode (no actual deployment)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-northeast-2
  HELM_RELEASE_NAME: sns-monitor
  HELM_CHART_PATH: ./helm/sns-monitor
  NAMESPACE: platform

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    # Only runs via manual workflow_dispatch now
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set environment variables
        id: env
        env:
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          ENV="${INPUT_ENVIRONMENT:-dev}"
          if [ "$ENV" == "prod" ]; then
            echo "cluster=prod-cluster" >> $GITHUB_OUTPUT
            echo "values_file=values-production.yaml" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "cluster=dev-cluster" >> $GITHUB_OUTPUT
            echo "values_file=values.yaml" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-eks-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Check EKS cluster endpoint configuration
        env:
          CLUSTER_NAME: ${{ steps.env.outputs.cluster }}
        run: |
          echo "=== EKS 클러스터 엔드포인트 설정 확인 ==="
          aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'cluster.resourcesVpcConfig.{PublicAccess:endpointPublicAccess,PrivateAccess:endpointPrivateAccess,Endpoint:endpoint}' \
            --output table || true

          echo ""
          echo "=== 클러스터 상태 확인 ==="
          aws eks describe-cluster \
            --name "$CLUSTER_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query 'cluster.status' \
            --output text || true

      - name: Update kubeconfig for EKS
        env:
          CLUSTER_NAME: ${{ steps.env.outputs.cluster }}
        run: |
          echo "=== kubeconfig 업데이트 ==="
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region ${{ env.AWS_REGION }}

          echo "=== 연결 테스트 ==="
          kubectl cluster-info || echo "⚠️ 클러스터 연결 실패 - 엔드포인트 설정을 확인하세요"
          kubectl get nodes || echo "⚠️ 노드 조회 실패"

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0

      - name: Helm dependency update
        run: |
          helm dependency update ${{ env.HELM_CHART_PATH }}

      - name: Helm lint
        env:
          VALUES_FILE: ${{ steps.env.outputs.values_file }}
        run: |
          helm lint ${{ env.HELM_CHART_PATH }} \
            -f "${{ env.HELM_CHART_PATH }}/$VALUES_FILE"

      - name: Create namespace if not exists
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} || \
          kubectl create namespace ${{ env.NAMESPACE }}

      - name: Create GHCR pull secret
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Determine image tag
        id: image_tag
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            echo "tag=$INPUT_IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with Helm (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          VALUES_FILE: ${{ steps.env.outputs.values_file }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
        run: |
          echo "🔍 Running Helm dry-run..."
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.NAMESPACE }} \
            -f "${{ env.HELM_CHART_PATH }}/$VALUES_FILE" \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }} \
            --set frontend.image.tag="$IMAGE_TAG" \
            --set apiBackend.image.tag="$IMAGE_TAG" \
            --set crawlers.youtube.image.tag="$IMAGE_TAG" \
            --set crawlers.dcinside.image.tag="$IMAGE_TAG" \
            --set secrets.youtubeApiKey=${{ secrets.YOUTUBE_API_KEY }} \
            --dry-run

      - name: Deploy with Helm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          VALUES_FILE: ${{ steps.env.outputs.values_file }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
          CLUSTER_NAME: ${{ steps.env.outputs.cluster }}
        run: |
          echo "🚀 Deploying to $CLUSTER_NAME..."
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.NAMESPACE }} \
            -f "${{ env.HELM_CHART_PATH }}/$VALUES_FILE" \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }} \
            --set frontend.image.tag="$IMAGE_TAG" \
            --set apiBackend.image.tag="$IMAGE_TAG" \
            --set crawlers.youtube.image.tag="$IMAGE_TAG" \
            --set crawlers.dcinside.image.tag="$IMAGE_TAG" \
            --set secrets.youtubeApiKey=${{ secrets.YOUTUBE_API_KEY }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Verify deployment
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n ${{ env.NAMESPACE }} -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}

          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}

          echo ""
          echo "=== Services ==="
          kubectl get services -n ${{ env.NAMESPACE }} -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }} -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}

      - name: Deployment summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          CLUSTER_NAME: ${{ steps.env.outputs.cluster }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
        run: |
          echo "## 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | $CLUSTER_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | ${{ env.NAMESPACE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | $IMAGE_TAG |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ env.HELM_RELEASE_NAME }} |" >> $GITHUB_STEP_SUMMARY
