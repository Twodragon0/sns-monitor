# GitHub Actions workflow for building and pushing Docker images to GitHub Packages (ghcr.io)
# 구성: Frontend + API Backend + YouTube Crawler + DCInside Crawler
name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docker/**'
      - 'lambda/**'
      - 'frontend/**'
      - '.github/workflows/docker-build-push.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (all, api-backend, frontend, youtube-crawler, dcinside-crawler)'
        required: true
        default: 'all'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/sns-monitor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-backend
            dockerfile: docker/Dockerfile.api
          - name: frontend
            dockerfile: docker/Dockerfile.frontend
          - name: youtube-crawler
            dockerfile: docker/Dockerfile.youtube-crawler
          - name: dcinside-crawler
            dockerfile: docker/Dockerfile.crawler

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
