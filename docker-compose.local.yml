services:
  # API Backend (로컬 모드)
  api-backend-local:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.local
    container_name: sns-monitor-api-backend-local
    ports:
      - "8080:8080"
    environment:
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/tmp/data
      - PYTHONPATH=/app:/app/lambda/common
    volumes:
      - local-data:/tmp/data
    networks:
      - sns-monitor-network

networks:
  sns-monitor-network:
    driver: bridge

volumes:
  local-data:

