{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sns-monitor.fullname" . }}-frontend
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "sns-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "sns-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      # Pod Identity를 사용하므로 ServiceAccount 명시 필요
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "sns-monitor.fullname" .) }}
      {{- with .Values.appImages.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "sns-monitor.podSecurityContext" . | nindent 8 }}
      containers:
        - name: frontend
          image: "{{ .Values.appImages.registry }}/{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            {{- include "sns-monitor.containerSecurityContext" . | nindent 12 }}
            # Frontend는 정적 파일만 서빙하므로 readOnlyRootFilesystem 활성화 (보안 강화)
            {{- if .Values.frontend.securityContext }}
            readOnlyRootFilesystem: {{ .Values.frontend.securityContext.readOnlyRootFilesystem }}
            {{- else }}
            readOnlyRootFilesystem: true
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
