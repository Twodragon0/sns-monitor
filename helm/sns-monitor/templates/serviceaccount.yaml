{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name | default (include "sns-monitor.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .Values.appImages.pullSecrets }}
imagePullSecrets:
  {{- toYaml .Values.appImages.pullSecrets | nindent 2 }}
{{- end }}
{{- end }}
