{{- if .Values.redis.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sns-monitor.fullname" . }}-redis-config
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
data:
  redis.conf: |
    protected-mode no
    appendonly yes
    maxmemory 100mb
    maxmemory-policy volatile-lru
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sns-monitor.fullname" . }}-redis-master
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "sns-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sns-monitor.fullname" . }}-redis
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "sns-monitor.fullname" . }}-redis-master
  replicas: 1
  selector:
    matchLabels:
      {{- include "sns-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "sns-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      volumes:
        - name: redis-config
          configMap:
            name: {{ include "sns-monitor.fullname" . }}-redis-config
            items:
              - key: redis.conf
                path: redis.conf
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
            - name: tmp
              mountPath: /tmp
          command:
            - sh
            - -c
            - |
              cp /etc/redis/redis.conf /data/redis.conf
              exec redis-server /data/redis.conf
          readinessProbe:
            exec:
              command:
                - redis-cli
                - PING
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - PING
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.master.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.master.persistence.storageClass }}
        storageClassName: {{ .Values.redis.master.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.master.persistence.size }}
{{- end }}
