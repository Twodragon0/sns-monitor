apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sns-monitor.fullname" . }}-config
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
data:
  # AWS Configuration
  AWS_DEFAULT_REGION: {{ .Values.config.awsRegion | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.config.awsAccessKeyId | quote }}

  # Service Endpoints (Internal Cluster DNS)
  DYNAMODB_ENDPOINT: {{ .Values.config.dynamodbEndpoint | quote }}
  S3_ENDPOINT: {{ .Values.config.s3Endpoint | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}

  # API Endpoints
  API_BACKEND_ENDPOINT: {{ .Values.config.apiBackendEndpoint | quote }}
  AUTH_SERVICE_ENDPOINT: {{ .Values.config.authServiceEndpoint | quote }}
  LLM_ANALYZER_ENDPOINT: {{ .Values.config.llmAnalyzerEndpoint | quote }}

  # DynamoDB Configuration
  DYNAMODB_TABLE: {{ .Values.config.dynamodbTable | quote }}
  AUTH_TABLE: {{ .Values.config.authTable | quote }}

  # S3 Configuration
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  S3_PREFIX: {{ .Values.config.s3Prefix | default "data" | quote }}

  # Application Configuration
  LOCAL_MODE: {{ .Values.config.localMode | quote }}
  LOCAL_DATA_DIR: {{ .Values.config.localDataDir | quote }}

  # Crawler Configuration
  CRAWL_SCHEDULE: {{ .Values.config.crawlSchedule | quote }}
  SEARCH_KEYWORDS: {{ .Values.config.searchKeywords | quote }}

  # Okta OIDC Configuration (public values)
  OKTA_ISSUER: {{ .Values.config.oktaIssuer | quote }}
  OKTA_CLIENT_ID: {{ .Values.config.oktaClientId | quote }}
  REDIRECT_URI: {{ .Values.config.redirectUri | quote }}
