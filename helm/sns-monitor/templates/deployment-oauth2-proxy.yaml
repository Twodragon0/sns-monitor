{{- if .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sns-monitor.fullname" . }}-oauth2-proxy
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: {{ .Values.oauth2Proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "sns-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "sns-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: oauth2-proxy
    spec:
      securityContext:
        {{- include "sns-monitor.podSecurityContext" . | nindent 8 }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          securityContext:
            {{- include "sns-monitor.containerSecurityContext" . | nindent 12 }}
          args:
            - --provider=oidc
            - --provider-display-name=Okta
            - --oidc-issuer-url=$(OKTA_ISSUER)
            - --client-id=$(OKTA_CLIENT_ID)
            - --client-secret=$(OKTA_CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-expire=24h
            - --cookie-refresh=1h
            - --email-domain=*
            - --upstream=static://202
            - --http-address=0.0.0.0:4180
            - --redirect-url={{ .Values.oauth2Proxy.config.redirectUrl }}
            - --whitelist-domain={{ .Values.oauth2Proxy.config.whitelistDomain }}
            - --pass-authorization-header=true
            - --pass-access-token=true
            - --set-authorization-header=true
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --request-logging=true
          env:
            - name: OKTA_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: OKTA_ISSUER
            - name: OKTA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: OKTA_CLIENT_ID
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-secrets
                  key: okta-client-secret
                  optional: true
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-secrets
                  key: cookie-secret
                  optional: true
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sns-monitor.fullname" . }}-oauth2-proxy
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  type: {{ .Values.oauth2Proxy.service.type }}
  ports:
    - port: {{ .Values.oauth2Proxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sns-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
{{- end }}
