apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sns-monitor.fullname" . }}-secrets
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
type: Opaque
stringData:
  # AWS Credentials
  aws-secret-access-key: {{ .Values.secrets.awsSecretAccessKey | default "test" | quote }}

  # API Keys
  youtube-api-key: {{ .Values.secrets.youtubeApiKey | default "" | quote }}
  twitter-bearer-token: {{ .Values.secrets.twitterBearerToken | default "" | quote }}
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  claude-api-key: {{ .Values.secrets.claudeApiKey | default "" | quote }}
  telegram-bot-token: {{ .Values.secrets.telegramBotToken | default "" | quote }}

  # Redis
  redis-password: {{ .Values.secrets.redisPassword | default (randAlphaNum 16) | quote }}

  # JWT
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 32) | quote }}

  # Okta OIDC
  okta-client-secret: {{ .Values.secrets.oktaClientSecret | default "" | quote }}
  okta-api-token: {{ .Values.secrets.oktaApiToken | default "" | quote }}

  # OAuth Credentials
  claude-oauth-client-id: {{ .Values.secrets.claudeOauthClientId | default "" | quote }}
  claude-oauth-client-secret: {{ .Values.secrets.claudeOauthClientSecret | default "" | quote }}
  openai-oauth-client-id: {{ .Values.secrets.openaiOauthClientId | default "" | quote }}
  openai-oauth-client-secret: {{ .Values.secrets.openaiOauthClientSecret | default "" | quote }}

  # OAuth2 Proxy
  cookie-secret: {{ .Values.secrets.cookieSecret | default (randAlphaNum 32 | b64enc) | quote }}
