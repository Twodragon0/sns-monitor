{{- if .Values.costOptimization.enabled }}
# 야간 스케일 다운 (22:00 KST)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sns-monitor.fullname" . }}-scale-down
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.costOptimization.scaleDown.schedule }}"
  timeZone: "Asia/Seoul"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "sns-monitor.fullname" . }}-scaler
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  echo "Scaling down sns-monitor pods for night time..."
                  kubectl scale deployment {{ include "sns-monitor.fullname" . }}-frontend --replicas=0 -n {{ .Release.Namespace }}
                  kubectl scale deployment {{ include "sns-monitor.fullname" . }}-api-backend --replicas=0 -n {{ .Release.Namespace }}
                  kubectl scale statefulset {{ include "sns-monitor.fullname" . }}-redis --replicas=0 -n {{ .Release.Namespace }}
                  echo "Scale down complete at $(date)"
---
# 아침 스케일 업 (07:00 KST)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sns-monitor.fullname" . }}-scale-up
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.costOptimization.scaleUp.schedule }}"
  timeZone: "Asia/Seoul"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "sns-monitor.fullname" . }}-scaler
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  echo "Scaling up sns-monitor pods for day time..."
                  kubectl scale statefulset {{ include "sns-monitor.fullname" . }}-redis --replicas=1 -n {{ .Release.Namespace }}
                  sleep 10
                  kubectl scale deployment {{ include "sns-monitor.fullname" . }}-api-backend --replicas=1 -n {{ .Release.Namespace }}
                  sleep 5
                  kubectl scale deployment {{ include "sns-monitor.fullname" . }}-frontend --replicas=1 -n {{ .Release.Namespace }}
                  echo "Scale up complete at $(date)"
---
# ServiceAccount for scaler
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sns-monitor.fullname" . }}-scaler
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
---
# Role for scaling
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sns-monitor.fullname" . }}-scaler
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch", "update"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sns-monitor.fullname" . }}-scaler
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sns-monitor.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "sns-monitor.fullname" . }}-scaler
    namespace: {{ .Release.Namespace }}
{{- end }}
