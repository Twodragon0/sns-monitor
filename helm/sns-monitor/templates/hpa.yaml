{{- if .Values.costOptimization.hpa.enabled }}
{{- if .Values.frontend.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sns-monitor.fullname" . }}-frontend
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sns-monitor.fullname" . }}-frontend
  minReplicas: {{ .Values.costOptimization.hpa.minReplicas }}
  maxReplicas: {{ .Values.costOptimization.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.costOptimization.hpa.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.costOptimization.hpa.targetMemoryUtilization }}
{{- end }}
---
{{- if .Values.apiBackend.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sns-monitor.fullname" . }}-api-backend
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sns-monitor.fullname" . }}-api-backend
  minReplicas: {{ .Values.costOptimization.hpa.minReplicas }}
  maxReplicas: {{ .Values.costOptimization.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.costOptimization.hpa.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.costOptimization.hpa.targetMemoryUtilization }}
{{- end }}
{{- end }}
