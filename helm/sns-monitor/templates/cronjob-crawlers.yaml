{{- if .Values.crawlers.jsonUpdate.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sns-monitor.fullname" . }}-json-update
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: json-update
spec:
  schedule: "{{ .Values.crawlers.jsonUpdate.schedule }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          # Pod Identity를 사용하므로 ServiceAccount 명시 필요
          serviceAccountName: {{ .Values.serviceAccount.name | default (include "sns-monitor.fullname" .) }}
          {{- with .Values.appImages.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "sns-monitor.podSecurityContext" . | nindent 12 }}
          restartPolicy: OnFailure
          tolerations:
            - key: "low-priority-arm-al2023"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "high-priority-arm-al2023"
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: {{ include "sns-monitor.name" . }}
                      app.kubernetes.io/component: api-backend
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: json-update
              image: "{{ .Values.appImages.registry }}/{{ .Values.apiBackend.image.repository }}:{{ .Values.apiBackend.image.tag }}"
              command: ["python", "update_all_members_json.py"]
              securityContext:
                {{- include "sns-monitor.containerSecurityContext" . | nindent 16 }}
              env:
                - name: LOCAL_MODE
                  value: "true"
                - name: LOCAL_DATA_DIR
                  value: "/app/local-data"
              resources:
                limits:
                  cpu: 100m
                  memory: 128Mi
                requests:
                  cpu: 25m
                  memory: 64Mi
              volumeMounts:
                - name: local-data
                  mountPath: /app/local-data
          volumes:
            - name: local-data
              persistentVolumeClaim:
                claimName: {{ include "sns-monitor.fullname" . }}-local-data
{{- end }}
---
