{{- if .Values.crawlers.youtube.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sns-monitor.fullname" . }}-youtube-crawler
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: youtube-crawler
spec:
  schedule: "{{ .Values.crawlers.youtube.schedule }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          # Pod Identity를 사용하므로 ServiceAccount 명시 필요
          serviceAccountName: {{ .Values.serviceAccount.name | default (include "sns-monitor.fullname" .) }}
          {{- with .Values.appImages.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "sns-monitor.podSecurityContext" . | nindent 12 }}
          restartPolicy: OnFailure
          # Tolerations for ARM nodes
          tolerations:
            - key: "low-priority-arm-al2023"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "high-priority-arm-al2023"
              operator: "Exists"
              effect: "NoSchedule"
          # Pod Affinity: Prefer same node as API backend (not required - allows running during scale-down)
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: {{ include "sns-monitor.name" . }}
                      app.kubernetes.io/component: api-backend
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: youtube-crawler
              image: "{{ .Values.appImages.registry }}/{{ .Values.crawlers.youtube.image.repository }}:{{ .Values.crawlers.youtube.image.tag }}"
              securityContext:
                {{- include "sns-monitor.containerSecurityContext" . | nindent 16 }}
              env:
                - name: YOUTUBE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "sns-monitor.fullname" . }}-secrets
                      key: youtube-api-key
                - name: LOCAL_MODE
                  value: "true"
                - name: LOCAL_DATA_DIR
                  value: "/app/local-data"
                - name: AWS_DEFAULT_REGION
                  value: "ap-northeast-2"
                - name: API_ENDPOINT
                  value: "http://{{ include "sns-monitor.fullname" . }}-api-backend:8080"
                - name: CHANNELS
                  value: "{{ .Values.crawlers.youtube.channels | default "@AkaivStudioOfficial,@BARABARA_KR" }}"
                - name: MAX_VIDEOS
                  value: "{{ .Values.crawlers.youtube.maxVideos | default "5" }}"
                - name: MAX_COMMENTS
                  value: "{{ .Values.crawlers.youtube.maxComments | default "50" }}"
              resources:
                {{- toYaml .Values.crawlers.youtube.resources | nindent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: local-data
                  mountPath: /app/local-data
          volumes:
            - name: tmp
              emptyDir: {}
            - name: local-data
              persistentVolumeClaim:
                claimName: {{ include "sns-monitor.fullname" . }}-local-data
{{- end }}
---
