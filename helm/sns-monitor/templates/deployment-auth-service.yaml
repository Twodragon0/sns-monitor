{{- if .Values.authService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sns-monitor.fullname" . }}-auth-service
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  replicas: {{ .Values.authService.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "sns-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth-service
  template:
    metadata:
      labels:
        {{- include "sns-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth-service
    spec:
      securityContext:
        {{- include "sns-monitor.podSecurityContext" . | nindent 8 }}
      containers:
        - name: auth-service
          image: "{{ .Values.authService.image.repository }}:{{ .Values.authService.image.tag }}"
          imagePullPolicy: {{ .Values.authService.image.pullPolicy }}
          securityContext:
            {{- include "sns-monitor.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-secrets
                  key: aws-secret-access-key
                  optional: true
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: AWS_DEFAULT_REGION
            - name: AUTH_TABLE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: AUTH_TABLE
            - name: DYNAMODB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: DYNAMODB_ENDPOINT
            - name: OKTA_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: OKTA_ISSUER
            - name: OKTA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: OKTA_CLIENT_ID
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-secrets
                  key: okta-client-secret
                  optional: true
            - name: REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sns-monitor.fullname" . }}-config
                  key: REDIRECT_URI
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.authService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sns-monitor.fullname" . }}-auth-service
  labels:
    {{- include "sns-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
spec:
  type: {{ .Values.authService.service.type }}
  ports:
    - port: {{ .Values.authService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sns-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth-service
{{- end }}
