# Production values for SNS Monitor
# Enhanced security and cost optimization
# namespace: platform

namespace:
  create: false
  name: platform
  labels:
    environment: production

# Increase replicas for HA
frontend:
  replicaCount: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

apiBackend:
  replicaCount: 3
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

authService:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

oauth2Proxy:
  replicaCount: 2
  config:
    redirectUrl: "https://sns-monitor.your-domain.com/oauth2/callback"
    whitelistDomain: ".your-domain.com"

# DynamoDB Local disabled in production (use AWS DynamoDB)
dynamodbLocal:
  enabled: false

# Enable TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/auth-url: "http://sns-monitor-oauth2-proxy.sns-monitoring.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
  hosts:
    - host: sns-monitor.your-domain.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: api-backend
        - path: /auth
          pathType: Prefix
          service: auth-service
        - path: /oauth2
          pathType: Prefix
          service: oauth2-proxy
  tls:
    - secretName: sns-monitor-tls
      hosts:
        - sns-monitor.your-domain.com

# Cost optimization - scale based on traffic
costOptimization:
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 60
    targetMemoryUtilization: 70

# Persistent storage with EBS gp3
persistence:
  enabled: true
  localData:
    storageClass: "ebs-gp3-ext4"
    size: 50Gi

# Redis HA
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
  master:
    persistence:
      size: 5Gi
      storageClass: "ebs-gp3-ext4"
  replica:
    replicaCount: 2
    persistence:
      size: 5Gi
      storageClass: "ebs-gp3-ext4"

# Crawler schedules optimized for production
crawlers:
  youtube:
    schedule: "0 */4 * * *"  # Every 4 hours
  dcinside:
    schedule: "0 */2 * * *"  # Every 2 hours
  twitter:
    schedule: "0 * * * *"    # Every hour

# Production config - use real AWS endpoints
config:
  awsRegion: "ap-northeast-2"
  dynamodbEndpoint: ""  # Empty = use real AWS DynamoDB
  s3Endpoint: ""  # Empty = use real AWS S3
  localMode: "false"
  oktaIssuer: "https://your-okta-domain.okta.com"
  oktaClientId: "your-production-client-id"
  redirectUri: "https://sns-monitor.your-domain.com/auth/callback"
