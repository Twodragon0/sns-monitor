# SNS Monitor - Local Development
services:
  redis:
    image: redis:7-alpine
    container_name: sns-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sns-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sns-monitor-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sns-monitor-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api-backend
    networks:
      - sns-network

  # Optional crawlers (run with: docker-compose --profile crawlers up)
  youtube-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.youtube-crawler
    container_name: sns-monitor-youtube-crawler
    profiles:
      - crawlers
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - CHANNELS=${CHANNELS:-}
      - SEARCH_KEYWORDS=${SEARCH_KEYWORDS:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network

  dcinside-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawler
    container_name: sns-monitor-dcinside-crawler
    profiles:
      - crawlers
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network

networks:
  sns-network:
    driver: bridge

volumes:
  redis-data:
