# SNS Monitor - Local Development
# Copy .env.example to .env and set YOUTUBE_API_KEY before running.

services:
  redis:
    image: redis:7-alpine
    container_name: sns-monitor-redis
    # Redis is internal-only; expose port only for local debugging via REDIS_HOST_PORT
    # ports:
    #   - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    networks:
      - sns-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sns-monitor-api
    ports:
      - "${API_PORT:-8888}:8080"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - MIROFISH_ENDPOINT=http://mirofish:5001
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-}
      - NAVER_CAFE_COOKIE=${NAVER_CAFE_COOKIE:-}
      - NAVER_CAFE_PROXY_URL=${NAVER_CAFE_PROXY_URL:-}
      - NAVER_CAFE_PROXY_USERNAME=${NAVER_CAFE_PROXY_USERNAME:-}
      - NAVER_CAFE_PROXY_PASSWORD=${NAVER_CAFE_PROXY_PASSWORD:-}
      - NAVER_CAFE_DISABLE_SSL_VERIFY=${NAVER_CAFE_DISABLE_SSL_VERIFY:-false}
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sns-monitor-frontend
    ports:
      - "${FRONTEND_PORT:-3080}:3000"
    depends_on:
      - api-backend
    networks:
      - sns-network

  # Optional crawlers (run with: docker-compose --profile crawlers up)
  youtube-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.youtube-crawler
    container_name: sns-monitor-youtube-crawler
    profiles:
      - crawlers
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - CHANNELS=${CHANNELS:-}
      - SEARCH_KEYWORDS=${SEARCH_KEYWORDS:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network

  dcinside-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawler
    container_name: sns-monitor-dcinside-crawler
    profiles:
      - crawlers
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network

  naver-cafe-crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.naver-crawler
    container_name: sns-monitor-naver-cafe-crawler
    profiles:
      - crawlers
    environment:
      - API_BASE_URL=http://api-backend:8080
      - LOCAL_MODE=true
      - LOCAL_DATA_DIR=/app/local-data
      - NAVER_CAFE_URLS=${NAVER_CAFE_URLS:-}
      - NAVER_CAFE_COOKIE=${NAVER_CAFE_COOKIE:-}
    volumes:
      - ./local-data:/app/local-data:rw
    depends_on:
      api-backend:
        condition: service_healthy
    networks:
      - sns-network

  # MiroFish AI Analysis Service (optional: set build context to your mirofish repo)
  mirofish:
    build:
      context: ${MIROFISH_CONTEXT:-./mirofish}
      dockerfile: Dockerfile
    container_name: sns-monitor-mirofish
    profiles:
      - analysis
    env_file:
      - .env.mirofish
    ports:
      - "5003:5001"
    volumes:
      - mirofish-uploads:/app/backend/uploads
      - ./local-data:/app/sns-data:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sns-network
    restart: unless-stopped

networks:
  sns-network:
    driver: bridge

volumes:
  redis-data:
  mirofish-uploads:
